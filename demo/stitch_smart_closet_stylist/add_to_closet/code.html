<script>
        // Simple micro-interaction for segmented control
        const buttons = document.querySelectorAll('.flex.bg-surface-container-low button');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => {
                    b.classList.remove('bg-white', 'text-primary', 'shadow-sm');
                    b.classList.add('text-outline-variant');
                });
                btn.classList.remove('text-outline-variant');
                btn.classList.add('bg-white', 'text-primary', 'shadow-sm');
            });
        });

        // Color selection interaction
        const colors = document.querySelectorAll('.rounded-full.cursor-pointer');
        colors.forEach(color => {
            color.addEventListener('click', () => {
                colors.forEach(c => c.classList.remove('ring-2', 'ring-primary', 'scale-110'));
                color.classList.add('ring-2', 'ring-primary', 'scale-110');
            });
        });
    </script>
