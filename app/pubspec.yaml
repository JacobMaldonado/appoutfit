name: closet_app
description: "Clo·set — Outfit suggestion app powered by your own wardrobe."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.6.3

  # Dependency injection
  get_it: ^8.0.3

  # Firebase (used in dev + prod; not initialised in local env)
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5

  # Auth providers
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Networking (generation API)
  http: ^1.4.0

  # Fonts
  google_fonts: ^6.2.1

  # Image picker (wardrobe photo upload)
  image_picker: ^1.1.2

  # Utilities
  equatable: ^2.0.7
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
